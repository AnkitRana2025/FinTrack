<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/dashboard.css">
  <title>Budget</title>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="logo">
        <h2>FinTack</h2>
      </div>
      <nav class="menu">
        <a href="dashboard.html" id="dashboardMenu">Dashboard</a>
        <a href="transaction.html" id="transactionMenu">Transaction</a>
        <a href="analytics.html" id="analyticsMenu">Analytics</a>
        <a href="budget.html" class="active">Budget</a>
        <a href="reports.html">Reports</a>
      </nav>
      <div class="tools">
        <a href="#" id="themeMenu">Theme</a>
      </div>
      <div class="user">
        <button id="logoutBtn">Log out</button>
      </div>
    </aside>
        <div class="sidebar-overlay"></div>


    <main class="main-content">
      <header class="navbar">
        <div class="left-nav">
          <button class="menu-btn">☰</button>
          <div class="search-box">
            <input type="text" placeholder="Search budget..." id="budgetSearch">
          </div>
        </div>
        <div class="right-nav">
          <!-- <button class="theme-btn" id="themeBtn">🌙</button> -->
          <button class="notification-btn">🔔</button>
          <div class="profile">
            <div class="profile-image" id="profileAvatar"></div>
            <div class="profile-info">
              <h4 id="profileName"></h4>
            </div>
          </div>
        </div>
      </header>

      <section class="hero budget-hero">
        <div class="welcome">
          <h1>Budget</h1>
          <p>Set monthly limits and track spending against each category.</p>
        </div>
        <div class="hero-actions">
          <p class="date" id="budgetMonthLabel"></p>
        </div>
      </section>

      <section class="stats">
        <div class="card balance-card">
          <div class="card-info">
            <p class="card-title">Total Budget</p>
            <h2 id="totalBudget">Rs. 0</h2>
            <span>This month</span>
          </div>
        </div>
        <div class="card expense-card">
          <div class="card-info">
            <p class="card-title">Spent</p>
            <h2 id="budgetSpent">Rs. 0</h2>
            <span>Tracked expenses</span>
          </div>
        </div>
        <div class="card income-card">
          <div class="card-info">
            <p class="card-title">Remaining</p>
            <h2 id="budgetRemaining">Rs. 0</h2>
            <span>Available</span>
          </div>
        </div>
        <div class="card savings-card">
          <div class="card-info">
            <p class="card-title">Categories</p>
            <h2 id="budgetCategoryCount">0</h2>
            <span>Budget plans</span>
          </div>
        </div>
      </section>

      <section class="transaction-section budget-form-section">
        <div class="section-header">
          <h2 style="color: white;">Create Budget</h2>
        </div>

        <form class="transaction-form budget-form" id="budgetForm">
          <div class="form-group">
            <label for="budgetCategory">Category</label>
            <select id="budgetCategory">
              <option value="">Select Category</option>
              <option>Food</option>
              <option>Shopping</option>
              <option>Travel</option>
              <option>Bills</option>
              <option>Entertainment</option>
              <option>Health</option>
              <option>Education</option>
              <option>Rent</option>
              <option>Fuel</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="budgetAmount">Monthly Limit</label>
            <input type="number" id="budgetAmount" placeholder="Rs. 0">
          </div>

          <div class="form-group">
            <label for="budgetMonth">Month</label>
            <input type="month" id="budgetMonth">
          </div>

          <button type="submit" class="add-btn" id="saveBudgetBtn">Save Budget</button>
        </form>
      </section>

      <section class="table-card budget-table-card">
        <div class="table-header">
          <h2>Budget Overview</h2>
        </div>

        <div class="budget-list" id="budgetList"></div>
      </section>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/responsive.js"></script>
</body>
</html>
