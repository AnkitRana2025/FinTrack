<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/transaction.css">
  <title>Transaction</title>
</head>
<body>
  <div class="dashboard">
      <aside class="sidebar">
        <div class="logo">
          <h2>FinTack</h2>
        </div>
        <nav class="menu">
          <a href="dashboard.html" id="dashboardMenu">Dashboard</a>
          <a href="transaction.html" id="transactionMenu">Transaction</a>
          <a href="analytics.html"  id="analyticsMenu">Analytics</a>
          <a href="budget.html">Budget</a>
          <a href="reports.html">Reports</a>
        </nav>
        <div class="tools">
          <a href="#"  id="themeMenu">Theme</a>
        </div>
        <div class="user">
          <button id="logoutBtn">Log out</button>
        </div>
    </aside>
    <!-- <div class="sidebar-overlay"></div> -->

      <main class="main-content">
        <header class="navbar">
          <div class="left-nav">
            <button class="menu-btn">☰</button>
            <div class="search-box">
              <input type="text" placeholder="Search transactions..." id="searchTransaction"/>
            </div>
          </div>
          <div class="right-nav">
            <!-- <button class="theme-btn" id="themeBtn" >🌙</button> -->
            <button class="notification-btn">🔔</button>
            <div class="profile">
              <div class="profile-image" id="profileAvatar"></div>
              <div class="profile-info">
                <h4 id="profileName"></h4>
              </div>
            </div>
          </div>
        </header>

    <!-- ========================= -->
    <!-- Hero -->
    <!-- ========================= -->

    <section class="transaction-hero">

        <div>

            <h1>Transactions</h1>

            <p>
                Manage all your income and expenses from one place.
            </p>

        </div>

        <button class="add-btn" id="openTransactionModal">

            + Add Transaction

        </button>

    </section>



    <!-- ========================= -->
    <!-- Summary -->
    <!-- ========================= -->

    <section class="transaction-summary">

        <div class="summary-card">

            <h4>Total Transactions</h4>

            <h2 id="transactionCount">

                0

            </h2>

        </div>

        <div class="summary-card">

            <h4>Total Income</h4>

            <h2 id="summaryIncome">

                ₹0

            </h2>

        </div>

        <div class="summary-card">

            <h4>Total Expense</h4>

            <h2 id="summaryExpense">

                ₹0

            </h2>

        </div>

        <div class="summary-card">

            <h4>Net Balance</h4>

            <h2 id="summaryBalance">

                ₹0

            </h2>

        </div>

    </section>



    <!-- ========================= -->
    <!-- Filters -->
    <!-- ========================= -->

    <section class="filter-card">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search by title..."
        >

        <select id="categoryFilter">

            <option value="all">

                All Categories

            </option>

        </select>

        <select id="typeFilter">

            <option value="all">

                All Types

            </option>

            <option value="income">

                Income

            </option>

            <option value="expense">

                Expense

            </option>

        </select>

        <select id="sortFilter">

            <option value="latest">

                Latest First

            </option>

            <option value="oldest">

                Oldest First

            </option>

            <option value="high">

                Highest Amount

            </option>

            <option value="low">

                Lowest Amount

            </option>

        </select>

    </section>



    <!-- ========================= -->
    <!-- Table -->
    <!-- ========================= -->

    <section class="table-card">

        <div class="table-header">

            <h2>

                All Transactions

            </h2>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>Title</th>

                        <th>Category</th>

                        <th>Type</th>

                        <th>Date</th>

                        <th>Amount</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="transactionTableBody"></tbody>

            </table>

        </div>

    </section>



    <!-- ========================= -->
    <!-- Pagination -->
    <!-- ========================= -->

    <section class="pagination">

        <button id="prevPage">

            Previous

        </button>

        <div class="page-number" id="pageNumber">

            1

        </div>

        <button id="nextPage">

            Next

        </button>

    </section>
 <!-- ========================= -->
<!-- Transaction Modal -->
<!-- ========================= -->

<div class="modal-overlay" id="transactionModal">

    <div class="modal">

        <div class="modal-header">

            <h2 id="modalTitle">
                Add Transaction
            </h2>

            <button id="closeModalBtn" class="close-btn">
                ✖
            </button>

        </div>

        <form id="modalTransactionForm">

            <div class="form-group">

                <label>Title</label>

                <input
                    type="text"
                    id="modalTitleInput"
                    placeholder="Transaction title"
                >

            </div>

            <div class="form-group">

                <label>Type</label>

                <select id="modalType">

                    <option value="income">Income</option>

                    <option value="expense">Expense</option>

                </select>

            </div>

            <div class="form-group">

                <label>Category</label>

                <select id="modalCategory">

                </select>

            </div>

            <div class="form-group">

                <label>Amount</label>

                <input
                    type="number"
                    id="modalAmount"
                    placeholder="₹0"
                >

            </div>

            <div class="form-group">

                <label>Date</label>

                <input
                    type="date"
                    id="modalDate"
                >

            </div>

            <div class="modal-actions">

                <button
                    type="button"
                    class="cancel-btn"
                    id="cancelModalBtn"
                >
                    Cancel
                </button>

                <button
                    type="submit"
                    class="save-btn"
                    id="saveModalBtn"
                >
                    Save Transaction
                </button>

            </div>

        </form>

    </div>

</div>
</main>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/transaction-page.js"></script>
<script src="js/responsive.js"></script>
</body>
</html>
